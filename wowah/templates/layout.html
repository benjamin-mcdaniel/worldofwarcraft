<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}WoW AH Tool{% endblock %}</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: rgba(255,255,255,0.06);
        --panel2: rgba(255,255,255,0.04);
        --border: rgba(255,255,255,0.10);
        --text: rgba(255,255,255,0.92);
        --muted: rgba(255,255,255,0.62);
        --accent: #7dd3fc;
        --accent2: #a78bfa;
        --good: #34d399;
        --bad: #fb7185;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: radial-gradient(1200px 800px at 20% 0%, rgba(167,139,250,0.20), transparent 55%),
                    radial-gradient(1000px 700px at 90% 10%, rgba(125,211,252,0.20), transparent 60%),
                    var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      a { color: inherit; }
      .mono { font-family: var(--mono); }
      .muted { color: var(--muted); }

      .app {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 18px;
        border-right: 1px solid var(--border);
        background: linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
        overflow: auto;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        background: var(--panel2);
        border-radius: 14px;
        margin-bottom: 14px;
      }
      .brand__dot {
        width: 10px; height: 10px; border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
      }
      .brand__title { font-weight: 700; letter-spacing: 0.2px; }

      .nav {
        display: grid;
        gap: 10px;
      }
      .nav__section {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 14px;
        padding: 12px;
      }
      .nav__title { font-weight: 700; margin-bottom: 8px; }

      .chiplist { display: grid; gap: 6px; }
      .chip {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
        text-decoration: none;
      }
      .chip:hover { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.05); }

      .main {
        padding: 22px;
      }

      .page { max-width: 1050px; }
      .page__header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .h1 { font-size: 26px; font-weight: 800; }

      .pill {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.04);
        color: var(--muted);
        white-space: nowrap;
      }

      .card {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 16px;
        padding: 14px;
        margin: 14px 0;
      }
      .card__title { font-weight: 800; margin-bottom: 10px; }

      .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 12px 0; }

      .input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(0,0,0,0.20);
        color: var(--text);
        outline: none;
      }
      .input:focus { border-color: rgba(125,211,252,0.45); box-shadow: 0 0 0 4px rgba(125,211,252,0.12); }

      .btn {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.12);
        background: linear-gradient(135deg, rgba(125,211,252,0.25), rgba(167,139,250,0.25));
        color: var(--text);
        cursor: pointer;
      }
      .btn:hover { border-color: rgba(255,255,255,0.22); }

      .search {
        display: grid;
        grid-template-columns: 1fr 110px;
        gap: 10px;
        align-items: center;
      }

      .suggest { margin-top: 10px; display: grid; gap: 6px; }
      .suggest__row {
        width: 100%;
        text-align: left;
        display: grid;
        grid-template-columns: 120px 1fr 1fr;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        cursor: pointer;
      }
      .suggest__row:hover { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.05); }

      .list { display: grid; gap: 6px; margin-top: 10px; }
      .list__row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.03);
        text-decoration: none;
      }

      .table { margin-top: 12px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.10); }
      .table__head, .table__row {
        display: grid;
        grid-template-columns: 160px 1fr 1fr;
        gap: 10px;
        padding: 10px 12px;
      }
      .table__head {
        background: rgba(255,255,255,0.06);
        color: var(--muted);
        font-weight: 700;
      }
      .table__row {
        background: rgba(255,255,255,0.02);
      }
      a.table__row { text-decoration: none; }
      a.table__row:hover { background: rgba(255,255,255,0.05); }

      .stat {
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        border-radius: 16px;
        padding: 12px 14px;
        min-width: 200px;
      }
      .stat__label { color: var(--muted); font-size: 12px; }
      .stat__value { font-size: 18px; font-weight: 800; margin-top: 4px; }

      @media (max-width: 980px) {
        .app { grid-template-columns: 1fr; }
        .sidebar { position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
        .search { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand__dot"></div>
          <div>
            <div class="brand__title">WoW AH Tool</div>
            <div class="muted" style="font-size: 12px;">Always-on trades + market</div>
          </div>
        </div>

        <div class="nav">
          <div class="nav__section">
            <div class="nav__title">Menu</div>
            <div class="chiplist">
              <a class="chip" href="/"><span>Market</span><span class="muted">Search</span></a>
            </div>
          </div>

          <div class="nav__section">
            <div class="nav__title">Trades (profitable)</div>
            <div class="muted" style="font-size: 12px; margin-bottom: 8px;">Next: conversions + crafts. For now this is UI scaffolding.</div>
            <div class="chiplist">
              <div class="chip"><span>None yet</span><span class="muted">configure</span></div>
            </div>
          </div>

          <div class="nav__section">
            <div class="nav__title">Recent items</div>
            <div class="chiplist">
              {% for item_id in recent|default([]) %}
                <a class="chip" href="/item/{{ item_id }}">
                  <span class="mono">{{ item_id }}</span>
                  <span class="muted">open</span>
                </a>
              {% endfor %}
            </div>
          </div>
        </div>
      </aside>

      <main class="main">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
