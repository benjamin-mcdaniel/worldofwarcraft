name = "wow-market-ingestion"
main = "src/index.ts"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
BNET_REGIONS = "us,eu"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "wow-market-data"

# Secrets (set via: wrangler secret put <NAME>)
# BATTLE_NET_KEY
# BATTLE_NET_SECRET

[triggers]
crons = ["*/30 * * * *"]

[dev]
port = 8788
local_protocol = "http"
